name: cloudflare-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  CLOUDFLARE_ACCOUNT_ID: 57c92cc47ff63b8d75f9e6477f92abda

jobs:
  deploy:
    name: Deploy frontend Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build Cloudflare Worker
        run: npm run cf:build

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >
          npx wrangler deploy
          --config wrangler.jsonc
          --keep-vars
          --routes "ourtrips.to/*"
          --routes "www.ourtrips.to/*"
