name: cloudflare-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  CLOUDFLARE_ACCOUNT_ID: 57c92cc47ff63b8d75f9e6477f92abda
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
  NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID }}

jobs:
  deploy:
    name: Deploy frontend Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release version
        if: github.event_name == 'push'
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: node scripts/check-release-version.mjs

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Validate public build environment
        run: |
          missing=0
          for name in \
            NEXT_PUBLIC_SUPABASE_URL \
            NEXT_PUBLIC_SUPABASE_ANON_KEY \
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY \
            NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing build variable::$name is required before building the Cloudflare Worker"
              missing=1
            fi
          done
          exit "$missing"

      - name: Build Cloudflare Worker
        run: npm run cf:build

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >
          npx wrangler deploy
          --config wrangler.jsonc
          --keep-vars
          --routes "ourtrips.to/*"
          --routes "www.ourtrips.to/*"
